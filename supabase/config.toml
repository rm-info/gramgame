# Supabase project configuration
# Voir : https://supabase.com/docs/guides/cli/config
project_id = "gramgame"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/**", "https://*.github.io/gramgame/**"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Edge function : signin est l'entrée pour utilisateurs non authentifiés
# (inscription + connexion par username). On désactive la vérification JWT
# au niveau plateforme — la fonction valide elle-même les inputs et utilise
# la service_role_key en interne pour les opérations privilégiées.
# Les autres fonctions (generate-exercise, correct-attempt) gardent
# verify_jwt = true par défaut : elles exigent un utilisateur connecté.
[functions.signin]
verify_jwt = false
