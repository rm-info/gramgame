# Supabase project configuration
# Voir : https://supabase.com/docs/guides/cli/config
project_id = "gramgame"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Le Site URL est utilisé par Supabase comme fallback quand `emailRedirectTo`
# (passé par signInWithOtp) n'est pas listé dans `additional_redirect_urls` :
# autant le pointer sur la prod publique pour éviter d'envoyer un lien cassé.
site_url = "https://gramgame.lab.rm-info.fr"
# URLs autorisées pour `emailRedirectTo` (magic links) :
# - prod publique : https://gramgame.lab.rm-info.fr (Caddy → /srv/static-apps/gramgame)
# - dev publique  : https://gramgame-dev.lab.rm-info.fr (Caddy → reverse_proxy localhost:5174)
# - dev local     : http://localhost:5174 (vite, quand on accède en direct sans Caddy)
additional_redirect_urls = [
    "https://gramgame.lab.rm-info.fr/**",
    "https://gramgame-dev.lab.rm-info.fr/**",
    "http://localhost:5174/**"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Aligné sur l'état actuel de la console (remote) — les defaults de la CLI
# diffèrent et écraseraient ces valeurs lors d'un `supabase config push`.
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

# MFA TOTP activé côté remote — explicité ici pour la même raison.
[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

# Edge function : signin est l'entrée pour utilisateurs non authentifiés
# (inscription + connexion par username). On désactive la vérification JWT
# au niveau plateforme — la fonction valide elle-même les inputs et utilise
# la service_role_key en interne pour les opérations privilégiées.
# Les autres fonctions (generate-exercise, correct-attempt) gardent
# verify_jwt = true par défaut : elles exigent un utilisateur connecté.
[functions.signin]
verify_jwt = false
